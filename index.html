<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全書類（作業員名簿）管理アプリ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fa-solid fa-bookmark"></i> 保存リスト</h3>
            <button id="close-sidebar" class="btn-icon" title="閉じる"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content" id="sidebar-list">
            <!-- Items generated by JS -->
            <p class="sidebar-empty">保存されているデータはありません。</p>
        </div>
        <div class="sidebar-footer">
            <button id="close-sidebar-bottom" class="btn-sidebar-close">
                <i class="fa-solid fa-xmark"></i> 保存リストを閉じる
            </button>
        </div>
    </div>
    
    <!-- Sidebar Toggle Button -->
    <button id="open-sidebar" class="sidebar-toggle" title="保存リストを開く">
        <i class="fa-solid fa-list-ul"></i>
        <span>保存リストを開く</span>
    </button>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-clipboard-check"></i> 安全書類 管理システム</h1>
            <p>提出状況を確認し、同じ会社に所属する全員分をまとめた催促メール文を一括作成します。<br>全ての項目がそろうまで「保存リスト」に自動保存されます。</p>
        </header>

        <main>
            <!-- Tabs -->
            <div class="tabs-container">
                <button id="tab-company" class="tab-btn" data-tab="company">
                    <i class="fa-solid fa-building"></i> 協力会社
                </button>
                <button id="tab-employee" class="tab-btn active" data-tab="employee">
                    <i class="fa-solid fa-user-tie"></i> 作業員
                </button>
                <button id="tab-solo" class="tab-btn" data-tab="solo">
                    <i class="fa-solid fa-user-shield"></i> 一人親方
                </button>
            </div>

            <section class="input-section glass-panel">
                <div class="input-group">
                    <label for="company-name">協力会社名</label>
                    <input type="text" id="company-name" placeholder="例: 株式会社〇〇建設（スペースなし）" list="company-list">
                    <datalist id="company-list"></datalist>
                    <span class="input-helper" id="company-name-helper">※スペースは入れないでください。</span>
                </div>
                <div class="input-group">
                    <label for="worker-name">作業員名</label>
                    <input type="text" id="worker-name" placeholder="例: 山田　太郎（姓と名の間に全角スペース）">
                    <span class="input-helper" id="worker-name-helper">※姓と名の間には全角スペースを入れてください。</span>
                </div>
            </section>

            <section class="checklist-section glass-panel">
                <div class="checklist-header">
                    <h2>管理項目一覧</h2>
                    <div class="bulk-actions">
                        <button id="check-all-received" class="btn-small btn-outline"><i class="fa-solid fa-check-double"></i> 全て受け取り済み</button>
                        <button id="clear-all" class="btn-small btn-outline btn-danger"><i class="fa-solid fa-eraser"></i> クリア</button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table id="checklist-table">
                        <thead>
                            <tr>
                                <th class="col-id">No.</th>
                                <th class="col-name">項目名</th>
                                <th class="col-status">チェック</th>
                            </tr>
                        </thead>
                        <tbody id="checklist-body">
                            <!-- Items will be generated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="action-section">
                <button id="generate-btn" class="btn-primary btn-large">
                    <i class="fa-solid fa-envelope-open-text"></i> 催促メール文作成・リストへ保存
                </button>
            </section>

            <section class="result-section glass-panel" id="result-section" style="display: none;">
                <div class="result-header">
                    <h2>生成されたメール本文</h2>
                    <button id="copy-btn" class="btn-secondary">
                        <i class="fa-regular fa-copy"></i> クリップボードにコピー
                    </button>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="email-output" rows="15" readonly></textarea>
                </div>
                <div id="copy-toast" class="toast">コピーしました！</div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
